<!-- Header -->
<div class="flex items-center gap-2 px-4 py-3 border-b border-gray-800 sticky top-0 bg-[#111]">
    <i data-lucide="rss" class="w-4 h-4 text-green-400"></i>
    <span class="text-sm font-semibold text-gray-300">Live Signal Feed</span>
</div>

<!-- Tweet list -->
<div class="divide-y divide-gray-800">
{% for tweet in tweets %}
<div class="px-4 py-3 hover:bg-gray-900 transition">

    <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-bold text-white">@jimcramer</span>
        <span class="text-xs text-gray-500">
            {% if tweet.created_at %}
                {{ tweet.created_at.strftime('%b %d') }}
            {% endif %}
        </span>
    </div>

    <p class="text-xs text-gray-400 mb-2 leading-relaxed line-clamp-3">
        {{ tweet.tweet_text }}
    </p>

    {% if tweet.tweet_link %}
    <a href="{{ tweet.tweet_link }}"
       target="_blank"
       class="text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1">
        <i data-lucide="external-link" class="w-3 h-3"></i>
        Ver tweet
    </a>
    {% endif %}

</div>
{% else %}
<div class="px-4 py-8 text-center text-gray-500 text-sm">
    No hay tweets disponibles
</div>
{% endfor %}
</div>
