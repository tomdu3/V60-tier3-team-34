<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CramerBot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0f0f0f; color: white; }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-[#1a1a1a] border-b border-gray-800 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <i data-lucide="zap" class="w-5 h-5 text-yellow-400"></i>
            <span class="font-bold text-lg tracking-wide">CRAMERBOT</span>
        </div>
        <div class="flex items-center gap-6 text-sm text-gray-400">
            <a href="/" class="text-white font-semibold flex items-center gap-1">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </a>
            <a href="#" class="hover:text-white transition flex items-center gap-1">
                <i data-lucide="rss" class="w-4 h-4"></i> Signal Feed
            </a>
            <a href="#" class="hover:text-white transition flex items-center gap-1">
                <i data-lucide="briefcase" class="w-4 h-4"></i> Positions
            </a>
            <a href="#" class="hover:text-white transition flex items-center gap-1">
                <i data-lucide="history" class="w-4 h-4"></i> Trade History
            </a>
            <a href="#" class="hover:text-white transition flex items-center gap-1">
                <i data-lucide="settings" class="w-4 h-4"></i> Settings
            </a>
        </div>
        <div class="w-8 h-8 rounded-full bg-green-500"></div>
    </nav>

    <div class="flex h-[calc(100vh-57px)] overflow-hidden">

        <!-- LEFT: Live Signal Feed -->
        <aside class="w-64 flex-shrink-0 border-r border-gray-800 overflow-y-auto bg-[#111]">
            <div class="flex items-center gap-2 px-4 py-3 border-b border-gray-800 sticky top-0 bg-[#111] z-10">
                <i data-lucide="rss" class="w-4 h-4 text-green-400"></i>
                <span class="text-sm font-semibold text-gray-300">Live Signal Feed</span>
            </div>
            <div class="px-3 py-2 border-b border-gray-800 bg-[#111] sticky top-10 z-10">
                <div class="flex gap-1">
                    <input id="ticker-input" type="text" placeholder="AAPL, NVDA, MSFT..."
                        class="flex-1 bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-green-500"/>
                    <button onclick="loadFeed()" class="bg-green-600 hover:bg-green-500 text-white text-xs px-2 py-1 rounded transition">
                        <i data-lucide="search" class="w-3 h-3"></i>
                    </button>
                    <button onclick="clearFilter()" class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-2 py-1 rounded transition">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
            </div>
            <div id="tweets-container" class="divide-y divide-gray-800">
                <div class="px-4 py-8 text-center text-gray-600 text-sm">Cargando...</div>
            </div>
        </aside>

        <!-- CENTER -->
        <main class="flex-1 overflow-y-auto p-6 space-y-4">

            <!-- Account Equity Chart -->
            <div class="bg-[#1a1a1a] rounded-lg border border-gray-800 p-4">
                <div class="flex items-center justify-between mb-3">
                    <div>
                        <h2 class="text-base font-semibold text-white">Account Equity</h2>
                        <div class="flex items-center gap-3 mt-1">
                            <span id="current-equity" class="text-2xl font-bold text-white">--</span>
                            <span id="equity-change" class="text-sm px-2 py-0.5 rounded-full"></span>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="loadChart(30)" id="btn-30" class="chart-btn border-green-500 text-white px-3 py-1 text-xs rounded border hover:border-green-500 transition">30D</button>
                        <button onclick="loadChart(60)" id="btn-60" class="chart-btn px-3 py-1 text-xs rounded border border-gray-700 text-gray-300 hover:text-white hover:border-green-500 transition">60D</button>
                        <button onclick="loadChart(90)" id="btn-90" class="chart-btn px-3 py-1 text-xs rounded border border-gray-700 text-gray-300 hover:text-white hover:border-green-500 transition">90D</button>
                    </div>
                </div>
                <canvas id="equityChart" height="120"></canvas>
            </div>

            <!-- Trade History -->
            <div class="bg-[#1a1a1a] rounded-lg border border-gray-800 p-4">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-base font-semibold text-white">Trade History</h2>
                    <div class="flex gap-1 text-xs">
                        <button onclick="filterTrades('all')" id="filter-all" class="trade-filter px-2 py-1 rounded bg-green-600 text-white">All</button>
                        <button onclick="filterTrades('filled')" id="filter-filled" class="trade-filter px-2 py-1 rounded bg-gray-700 text-gray-400">Filled</button>
                        <button onclick="filterTrades('pending')" id="filter-pending" class="trade-filter px-2 py-1 rounded bg-gray-700 text-gray-400">Pending</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs">
                        <thead class="border-b border-gray-700">
                            <tr class="text-gray-500">
                                <th class="text-left py-2 px-2">Ticker</th>
                                <th class="text-left py-2 px-2">Side</th>
                                <th class="text-left py-2 px-2">Status</th>
                                <th class="text-left py-2 px-2">Qty</th>
                                <th class="text-left py-2 px-2">Price</th>
                                <th class="text-left py-2 px-2">Time</th>
                            </tr>
                        </thead>
                        <tbody id="trades-container" class="divide-y divide-gray-800">
                            <tr><td colspan="6" class="text-center py-4 text-gray-600">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>

        <!-- RIGHT -->
        <aside class="w-80 flex-shrink-0 border-l border-gray-800 overflow-y-auto bg-[#111]">

            <!-- Trade Execution -->
            <div class="p-4 border-b border-gray-800">
                <h3 class="text-xs font-semibold text-gray-400 uppercase mb-3">Trade Execution</h3>
                <div class="flex gap-2 mb-3">
                    <input id="trade-ticker" type="text" placeholder="Ticker (AAPL)"
                        class="flex-1 bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-green-500 uppercase"/>
                    <button onclick="setSide('BUY')" id="btn-buy" class="px-3 py-1.5 text-xs rounded bg-green-600 text-white font-semibold transition">BUY</button>
                    <button onclick="setSide('SELL')" id="btn-sell" class="px-3 py-1.5 text-xs rounded bg-gray-700 text-gray-400 font-semibold transition">SELL</button>
                </div>
                <div class="flex gap-2 mb-3">
                    <button onclick="setOrderType('market')" id="btn-market" class="flex-1 py-1.5 text-xs rounded bg-green-600 text-white font-semibold transition">Market</button>
                    <button onclick="setOrderType('limit')" id="btn-limit" class="flex-1 py-1.5 text-xs rounded bg-gray-700 text-gray-400 font-semibold transition">Limit</button>
                </div>
                <div class="mb-3">
                    <label class="text-xs text-gray-500 mb-1 block">Shares</label>
                    <input id="trade-qty" type="number" min="1" value="1"
                        class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-green-500"/>
                </div>
                <div id="limit-price-field" class="mb-3 hidden">
                    <label class="text-xs text-gray-500 mb-1 block">Limit Price</label>
                    <input id="trade-price" type="number" step="0.01" placeholder="0.00"
                        class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-green-500"/>
                </div>
                <button onclick="executeTrade()" id="btn-confirm"
                    class="w-full py-2 rounded text-sm font-bold bg-green-600 hover:bg-green-500 text-white transition">
                    Confirm BUY
                </button>
            </div>

            <!-- Open Positions -->
            <div class="p-4 border-b border-gray-800">
                <h3 class="text-sm font-semibold text-white flex items-center gap-2">
                    <i data-lucide="briefcase" class="w-4 h-4 text-green-400"></i>
                    Open Positions <span id="pos-count" class="text-xs text-gray-500">(0)</span>
                </h3>
            </div>
            <div id="positions-container" class="space-y-2 p-4">
                <div class="text-center text-gray-600 text-sm py-8">Cargando posiciones...</div>
            </div>

        </aside>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        lucide.createIcons();

        // Signal Feed
        function loadFeed() {
            const tickers = document.getElementById('ticker-input').value.trim();
            const url = tickers ? `/api/signal-feed?tickers=${encodeURIComponent(tickers)}` : '/api/signal-feed';
            const container = document.getElementById('tweets-container');
            container.innerHTML = '<div class="px-4 py-8 text-center text-gray-600 text-sm">Cargando...</div>';
            fetch(url)
                .then(r => r.json())
                .then(tweets => {
                    if (!tweets.length) {
                        container.innerHTML = '<div class="px-4 py-8 text-center text-gray-500 text-sm">No hay tweets para esos tickers</div>';
                        return;
                    }
                    container.innerHTML = tweets.map(t => `
                        <div class="px-4 py-3 hover:bg-gray-900 transition">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-xs font-bold text-white">@jimcramer</span>
                                <span class="text-xs text-gray-500">${t.created_at ? t.created_at.slice(0, 10) : ''}</span>
                            </div>
                            <p class="text-xs text-gray-400 mb-2 leading-relaxed line-clamp-3">${t.text || ''}</p>
                            ${t.link ? `<a href="${t.link}" target="_blank" class="text-xs text-blue-400 hover:text-blue-300">Ver tweet</a>` : ''}
                        </div>
                    `).join('');
                    lucide.createIcons();
                });
        }

        function clearFilter() {
            document.getElementById('ticker-input').value = '';
            loadFeed();
        }

        document.getElementById('ticker-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') loadFeed();
        });

        loadFeed();

        // Equity Chart
        let chart = null;

        function loadChart(days) {
            document.querySelectorAll('.chart-btn').forEach(b => {
                b.classList.remove('border-green-500', 'text-white');
                b.classList.add('text-gray-300');
            });
            document.getElementById(`btn-${days}`).classList.add('border-green-500', 'text-white');
            document.getElementById(`btn-${days}`).classList.remove('text-gray-300');

            fetch(`/api/account-equity?days=${days}`)
                .then(r => r.json())
                .then(data => {
                    const isGain = data.total_change >= 0;
                    const color = isGain ? '#22c55e' : '#ef4444';

                    document.getElementById('current-equity').textContent =
                        '$' + data.current_equity.toLocaleString('en-US', {minimumFractionDigits: 2});

                    const changeEl = document.getElementById('equity-change');
                    changeEl.textContent = `${isGain ? '+' : ''}$${data.total_change.toLocaleString('en-US', {minimumFractionDigits: 2})} (${isGain ? '+' : ''}${data.percent_change.toFixed(2)}%)`;
                    changeEl.className = `text-sm px-2 py-0.5 rounded-full ${isGain ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'}`;

                    const labels = data.equity_history.map(d => d.date);
                    const values = data.equity_history.map(d => d.equity);

                    if (chart) chart.destroy();

                    chart = new Chart(document.getElementById('equityChart'), {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [{
                                data: values,
                                borderColor: color,
                                backgroundColor: color + '20',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 0,
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: {
                                    ticks: { color: '#6b7280', maxTicksLimit: 6, font: { size: 10 } },
                                    grid: { color: '#1f2937' }
                                },
                                y: {
                                    ticks: {
                                        color: '#6b7280',
                                        font: { size: 10 },
                                        callback: v => '$' + (v / 1000).toFixed(0) + 'k'
                                    },
                                    grid: { color: '#1f2937' }
                                }
                            }
                        }
                    });
                });
        }

        // Trade Execution
        let tradeSide = 'BUY';
        let orderType = 'market';

        function setSide(side) {
            tradeSide = side;
            document.getElementById('btn-buy').className = `px-3 py-1.5 text-xs rounded font-semibold transition ${side === 'BUY' ? 'bg-green-600 text-white' : 'bg-gray-700 text-gray-400'}`;
            document.getElementById('btn-sell').className = `px-3 py-1.5 text-xs rounded font-semibold transition ${side === 'SELL' ? 'bg-red-600 text-white' : 'bg-gray-700 text-gray-400'}`;
            const btn = document.getElementById('btn-confirm');
            btn.textContent = `Confirm ${side}`;
            btn.className = `w-full py-2 rounded text-sm font-bold text-white transition ${side === 'BUY' ? 'bg-green-600 hover:bg-green-500' : 'bg-red-600 hover:bg-red-500'}`;
        }

        function setOrderType(type) {
            orderType = type;
            document.getElementById('btn-market').className = `flex-1 py-1.5 text-xs rounded font-semibold transition ${type === 'market' ? 'bg-green-600 text-white' : 'bg-gray-700 text-gray-400'}`;
            document.getElementById('btn-limit').className = `flex-1 py-1.5 text-xs rounded font-semibold transition ${type === 'limit' ? 'bg-green-600 text-white' : 'bg-gray-700 text-gray-400'}`;
            document.getElementById('limit-price-field').classList.toggle('hidden', type !== 'limit');
        }

        function executeTrade() {
            const ticker = document.getElementById('trade-ticker').value.trim().toUpperCase();
            const qty = document.getElementById('trade-qty').value;
            if (!ticker) { alert('Ingresá un ticker'); return; }
            if (!qty || qty < 1) { alert('Ingresá una cantidad válida'); return; }
            if (!confirm(`¿Confirmar ${tradeSide} ${qty} x ${ticker}?`)) return;
            alert(`✓ Orden ${tradeSide} de ${qty} x ${ticker} enviada`);
        }

        // Trade History
        let trades = [
            { ticker: 'AAPL', side: 'BUY', status: 'Filled', qty: 50, price: 170.25, time: '2026-04-21 10:30', statusColor: 'green' },
            { ticker: 'NVDA', side: 'SELL', status: 'Pending', qty: 25, price: 920.75, time: '2026-04-21 10:15', statusColor: 'yellow' },
            { ticker: 'MSFT', side: 'BUY', status: 'Filled', qty: 30, price: 415.20, time: '2026-04-21 09:45', statusColor: 'green' }
        ];

        function filterTrades(filter) {
            document.querySelectorAll('.trade-filter').forEach(b => b.className = 'trade-filter px-2 py-1 rounded bg-gray-700 text-gray-400');
            document.getElementById(`filter-${filter}`).className = 'trade-filter px-2 py-1 rounded bg-green-600 text-white';
            renderTrades(filter);
        }

        function renderTrades(filter) {
            const container = document.getElementById('trades-container');
            const filtered = filter === 'all' ? trades : trades.filter(t => t.status.toLowerCase() === filter);
            if (!filtered.length) {
                container.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-gray-600">Sin trades</td></tr>`;
                return;
            }
            container.innerHTML = filtered.map(t => `
                <tr class="hover:bg-gray-900">
                    <td class="py-2 px-2 font-bold text-white">${t.ticker}</td>
                    <td class="py-2 px-2"><span class="px-2 py-0.5 rounded text-xs ${t.side === 'BUY' ? 'bg-green-900 text-green-400' : 'bg-red-900 text-red-400'}">${t.side}</span></td>
                    <td class="py-2 px-2"><span class="px-2 py-0.5 rounded text-xs ${t.statusColor === 'green' ? 'bg-green-900 text-green-400' : 'bg-yellow-900 text-yellow-400'}">${t.status}</span></td>
                    <td class="py-2 px-2 text-gray-300">${t.qty}</td>
                    <td class="py-2 px-2 text-gray-300">$${t.price}</td>
                    <td class="py-2 px-2 text-gray-500">${t.time}</td>
                </tr>
            `).join('');
        }

        // Open Positions
        function loadPositions() {
            fetch('/api/positions')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('positions-container');
                    const count = data.positions.length;
                    document.getElementById('pos-count').textContent = `(${count})`;
                    if (!count) {
                        container.innerHTML = '<div class="text-center text-gray-600 text-sm py-8">Sin posiciones abiertas</div>';
                        return;
                    }
                    container.innerHTML = data.positions.map(p => {
                        const isGain = p.pnl >= 0;
                        return `
                            <div class="bg-[#1a1a1a] rounded border border-gray-700 p-3 space-y-2">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <div class="text-sm font-bold text-white">${p.ticker}</div>
                                        <div class="text-xs text-gray-500">${p.quantity} shares @ $${p.avg_price.toFixed(2)}</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-sm font-semibold text-white">$${p.current_price.toFixed(2)}</div>
                                        <div class="text-xs ${isGain ? 'text-green-400' : 'text-red-400'}">
                                            ${isGain ? '+' : ''}${p.pnl.toFixed(2)} (${isGain ? '+' : ''}${p.pnl_percent.toFixed(2)}%)
                                        </div>
                                    </div>
                                </div>
                                <button onclick="closePosition('${p.ticker}')" class="w-full bg-red-600 hover:bg-red-500 text-white text-xs py-1.5 rounded transition">
                                    Close Position
                                </button>
                            </div>
                        `;
                    }).join('');
                    lucide.createIcons();
                });
        }

        function closePosition(ticker) {
            if (!confirm(`¿Cerrar posición de ${ticker}?`)) return;
            fetch(`/api/positions/close?ticker=${ticker}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        alert(`✓ ${ticker} cerrado`);
                        loadPositions();
                    } else {
                        alert(`✗ Error: ${data.message}`);
                    }
                })
                .catch(e => alert('Error al cerrar posición'));
        }

        loadChart(30);
        loadPositions();
        renderTrades('all');
    </script>
</body>
</html>
